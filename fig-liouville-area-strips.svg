<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 470" width="560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Infinitesimal phase-space area element and its four boundary strips S1 S2 S3 S4">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 z" fill="#1f2330"/>
    </marker>
    <marker id="ai" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 z" fill="#43509e"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="638" height="468" rx="14" fill="#fcfcfe" stroke="#e6e7ee"/>

  <!-- boundary strips (drawn under the rectangle outline) -->
  <!-- S1 left, S2 right : horizontal sweep (from q-dot) -->
  <rect x="176" y="150" width="34" height="170" fill="#43509e" fill-opacity="0.15" stroke="#43509e" stroke-opacity="0.55"/>
  <rect x="430" y="150" width="34" height="170" fill="#43509e" fill-opacity="0.28" stroke="#43509e" stroke-opacity="0.6"/>
  <!-- S3 bottom, S4 top : vertical sweep (from p-dot) -->
  <rect x="210" y="320" width="220" height="32" fill="#b0701c" fill-opacity="0.16" stroke="#b0701c" stroke-opacity="0.55"/>
  <rect x="210" y="118" width="220" height="32" fill="#b0701c" fill-opacity="0.30" stroke="#b0701c" stroke-opacity="0.6"/>

  <!-- the area element (delta q x delta p) -->
  <rect x="210" y="150" width="220" height="170" fill="none" stroke="#1f2330" stroke-width="2"/>

  <!-- strip labels -->
  <text x="193" y="241" font-size="18" font-weight="600" fill="#3a4790" text-anchor="middle">S₁</text>
  <text x="447" y="241" font-size="18" font-weight="600" fill="#3a4790" text-anchor="middle">S₂</text>
  <text x="320" y="343" font-size="18" font-weight="600" fill="#8a5312" text-anchor="middle">S₃</text>
  <text x="320" y="141" font-size="18" font-weight="600" fill="#8a5312" text-anchor="middle">S₄</text>

  <!-- displacement thickness cues -->
  <line x1="430" y1="300" x2="464" y2="300" stroke="#43509e" stroke-width="1.6" marker-end="url(#ai)"/>
  <text x="475" y="299" font-size="13" fill="#3a4790">q̇ dt</text>
  <line x1="400" y1="150" x2="400" y2="118" stroke="#b0701c" stroke-width="1.6" marker-end="url(#ah)" stroke-opacity="0"/>
  <line x1="398" y1="150" x2="398" y2="120" stroke="#8a5312" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="405" y="112" font-size="13" fill="#8a5312">ṗ dt</text>

  <!-- flow displacement vector at corner A -->
  <line x1="210" y1="320" x2="252" y2="288" stroke="#1f2330" stroke-width="1.8" marker-end="url(#ah)"/>
  <text x="258" y="286" font-size="13" fill="#1f2330">(q̇ dt, ṗ dt)</text>

  <!-- corner coordinates -->
  <circle cx="210" cy="320" r="3" fill="#1f2330"/>
  <circle cx="430" cy="320" r="3" fill="#1f2330"/>
  <circle cx="210" cy="150" r="3" fill="#1f2330"/>
  <circle cx="430" cy="150" r="3" fill="#1f2330"/>
  <text x="150" y="340" font-size="13" fill="#1f2330">(q, p)</text>
  <text x="452" y="340" font-size="13" fill="#1f2330">(q+δq, p)</text>
  <text x="150" y="146" font-size="13" fill="#1f2330">(q, p+δp)</text>
  <text x="440" y="146" font-size="13" fill="#1f2330">(q+δq, p+δp)</text>

  <!-- edge lengths -->
  <text x="320" y="312" font-size="13" fill="#555" text-anchor="middle">δq</text>
  <text x="222" y="238" font-size="13" fill="#555">δp</text>

  <!-- little q,p axes -->
  <line x1="56" y1="430" x2="112" y2="430" stroke="#777" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="56" y1="430" x2="56" y2="376" stroke="#777" stroke-width="1.4" marker-end="url(#ah)"/>
  <text x="116" y="434" font-size="13" fill="#777">q</text>
  <text x="48" y="372" font-size="13" fill="#777">p</text>
</svg>
